 <!DOCTYPE html>
    <html lang="en">
        <link rel="stylesheet" href="../css/settings.css">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=photo_camera" />
        <title>ADMIN IT</title>
    </head>
    <body>
        <div class ="layout">
            <aside>
                <section class="sidebar-img">  
                    <div class="profile-container">
                        <img src="logo.png" id="profile-img" class="profile-img">
                        <label for="file-path" class="camera-icon">
                            <span class="material-symbols-outlined">photo_camera</span>
                        </label>
                        <input type="file" accept="image/jpeg, image/png, image/jpg" id="file-path">
                    </div>
                    <div class="sidebar-header">
                            <p>Admin IT</p>
                            <p>Dashboard</p>
                        </div>
               </section>
                    <hr>
                <div class = "menu">
                        <div class="menu-item"> <a href="Dashboard.html">Dashboard</a></div>
                        <div class="menu-item"> <a href="BarangayActivation.html">Barangay Activation</a></div>
                        <div class="menu-item"> <a href="keymanagement.html">Key Management</a></div>
                            <div class="menu-item"> <a href="settings.html">Settings</a></div>
                </div>
                <footer>
                    <hr>
                        <div class="footer-profile">
                            <img src="logo.png" class="email-img">

                            <div>
                                <p class="name">Admin IT</p>
                                <p class="email">admin@gmail.com</p>
                            </div>
                        </div>
                </footer>
                </footer>
            </aside>
            <main class="content">

                <h1 class="title">Settings</h1>
                <p class="subtitle">Manage your account Settings and preference</p>

                
                <div class="settings-tabs">
                    <a href="settings.html" class="tab">Profile</a>
                    <a href="security.html" class="tab">Security</a>
                    <a href="notification.html" class="tab">Notification</a>
                </div>

                
                <div class="settings-profile">

                    <h2 class="settings-title">Profile Information</h2>

                    <div class="profile-section">
                        <div class="avatar-box">

                        <img src="logo.png" id="avatarPreview" class="avatar-circle">

                        
                        <input type="file" id="avatarInput" accept="image/*" hidden>

                        
                        <button type="button" class="avatar-btn" onclick="document.getElementById('avatarInput').click()">
                            Change Profile
                        </button>

                    </div>

                        <form class="profile-form">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" placeholder="First Name">
                            </div>

                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" placeholder="Last Name">
                            </div>

                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" placeholder="Email Address">
                            </div>

                            <div class="form-group">
                                <label>Role</label>
                                <input type="text" placeholder="Administrator" disabled>
                            </div>

                            <button class="save-btn">Save</button>
                        </form>
                    </div>

                </div>

            </main>        
         </div>
        <script src="../js/settings.js"></script>
        <script src="../js/uploadimage.js"></script>
    </body>
</html>
