<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
    <title>EBPR</title>
</head>
<body>
    <div class="container" id="container">
         <div class="sign-up-container">
            <form>
                 <h1 class="create">Sign Up</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i ></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                </div>

                <span>or use your email for registration</span>
                <input type="text" placeholder="Name" id="Name"/>    
                <input type="email" placeholder="Email" id="Email" />
                <input type="password" placeholder="Password" />  
                
                <select class="dropdown" id="barangay">
                <option value="">Select Barangay</option>
                <option value="Rizal">Rizal</option>
                <option value="Pembo">Pembo</option>
                <option value="Comembo">Comembo</option>
                </select>
                <button onclick="register()">Sign Up</button>

            </form>
         </div>

         
                <div class="sign-in-container">
                    <form>
                        <h1>Sign In</h1>

                        <div class="social-icons">
                            <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i ></a>
                            <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                        </div>

                        <span>or use your email password</span> 
                        <input type="email" placeholder="Email" />
                        <input type="password" placeholder="Password" />        
                        <a href="#">Forget Your Password?</a>
                        <button>Sign In</button>
                    </form>
                </div>

                <div class="toggle-container">
                    <div class="toggle">



                        
                        <div class="toggle-panel toggle-left">
                            <h1>Welcome Back!</h1>
                            <p>To keep track on your business please login with your personal info</p>
                            <button class="ghost" id="signIn">Sign In</button>
                        </div>

                        <div class="toggle-panel toggle-right">
                            <h1>Hello, kabusiness!</h1>
                            <p>Enter your personal details and start journey with us</p>
                            <button class="ghost" id="signUp">Sign Up</button>
                        </div>
                    </div>
                </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
