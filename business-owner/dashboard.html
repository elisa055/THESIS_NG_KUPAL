<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Owner Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <header class="header">
            <div class="header-left">
                <img src="images/logo.png" alt="Barangay Pembo Logo" class="logo">
                <div>
                    <span id="name"></span>
                    <p>Barangay Pembo</p>
                    <p>Business Owner Portal</p>
                </div>
            </div>

            <div class="header-right">
                <p>Owner Name</p>
                <span id="gmail"></span>
                <p>Owner@gmail.com</p>
                <a href="#" class="logout">Logout</a>
            </div>
        </header>

        <main class="main-content">
            <div class="header-row">
                <div>
                    <h2>My Businesses</h2>
                    <p class="subtitle">
                        Manage your registered businesses and renewals
                    </p>
                </div>

                <button class="register-btn">
                    Register New Business
                </button>
            </div>

            <div class="business-box">
                <div class="box-top">
                    <div>
                        <p class="business-name">Business Name</p>
                        <p class="permit-id">Permit ID</p>
                    </div>

                    <div class="status-group">
                        <span class="status">Pending</span>
                        <span class="status">Pending</span>
                    </div>
                </div>

                <div class="box-middle">
                    <div>Type</div>
                    <div>Zone</div>
                    <div>Registered</div>
                    <div>Renewal</div>
                </div>

                <div class="box-bottom">
                    <a href="details.html">
                     <button class="details-btn">View Details</button>
                    </a>
                </div>
            </div>

        </main>

    </div>
</body>
</html>
